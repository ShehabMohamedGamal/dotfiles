monitor=eDP-1,1920x1080@120.0,0x0,1
#source=~/.config/hypr/mocha.conf

# -----------------------------------------------------
# UWSM INTEGRATION
# -----------------------------------------------------
# 1. Finalize the session (Mark startup as complete)
exec-once = uwsm finalize

# 2. Critical Components (Wrap with uwsm app)
#    Note: waybar, swaync, and hypridle are better managed as systemd services 
#    (systemctl --user enable waybar), but uwsm app works too.
exec-once = uwsm app -- awww-daemon 
exec-once = uwsm app -- hypridle 
exec-once = uwsm app -- swaync
exec-once = uwsm app -- waybar 
exec-once = uwsm app -- swayosd-server
exec-once = uwsm app -- wl-paste --watch cliphist store
exec-once = systemctl --user start hyprpolkitagent

# 3. Environment Variables
# Moved to ~/.config/uwsm/env
# Only keep Hyprland-internal specific vars here if needed
env = AQ_DRM_DEVICES,/dev/dri/card2:/dev/dri/card1

# -----------------------------------------------------
# GENERAL & INPUT
# -----------------------------------------------------



general {
    border_size = 1
    gaps_in = 3
    gaps_out = 1
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    extend_border_grab_area = true
    hover_icon_on_border = true
    allow_tearing = false


}

input {
    kb_layout = us,eg
    kb_options =  grp:alt_shift_toggle # caps:swapescape,
    repeat_rate = 25
    repeat_delay = 600
    follow_mouse = 1
    mouse_refocus = true
numlock_by_default = true
    float_switch_override_focus = 1
    touchpad {
        disable_while_typing = true
        natural_scroll = true
        scroll_factor = 1.0
        tap-to-click = true
    }
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vrr = 0
    vfr = false
    mouse_move_enables_dpms = false
    key_press_enables_dpms = false
    layers_hog_keyboard_focus = true
    focus_on_activate = false
    mouse_move_focuses_monitor = true
}

decoration {
    rounding = 5
    active_opacity = 1.0
    inactive_opacity = 1.0
    shadow {
        enabled = true
        range = 5
        render_power = 4
        color = rgba(1a1a1aee)
    }
    blur {
        enabled = true
        size = 3
        passes = 1
        new_optimizations = true
    }
}

animations {
    enabled = yes, please :)
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

# -----------------------------------------------------
# BINDS & KEYWORDS
# -----------------------------------------------------
$mainMod = SUPER
$terminal = kitty
$fileManager = nemo
$menu = ${XDG_CONFIG_HOME}/rofi/launchers/type-2/launcher.sh
$browser= zen

# Ensure all launched apps are wrapped in 'uwsm app --'
bind = $mainMod, Q, exec, uwsm app -- $terminal
bind = $mainMod, W, exec, uwsm app -- $browser
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, ${XDG_CONFIG_HOME}/rofi/scripts/powermenu_t2
bind = $mainMod, E, exec, uwsm app -- $fileManager
bind = $mainMod, x, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, space, exec, $menu
bind = $mainMod, V, exec, rofi -modi clipboard:/home/shehab/.config/rofi/cliphist-rofi-img -show clipboard -show-icons -theme '/home/shehab/.config/rofi/catppuccin-clipboard.rasi'
bind = $mainMod, n, exec, hyprctl switchxkblayout at-translated-set-2-keyboard next

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod, F, fullscreenstate,2 0

# Screenshots
bind = , Print, exec, hyprshot -m window
bind = shift, Print, exec, hyprshot -m region
bind = ctrl, Print, exec, hyprshot -m output

bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume / Brightness (SwayOSD)
bindel = ,XF86AudioRaiseVolume, exec, swayosd-client --output-volume 5 
bindel = ,XF86AudioLowerVolume, exec, swayosd-client --output-volume -5 
bindel = ,XF86AudioMute, exec, swayosd-client --output-volume mute-toggle 
bindel = ,XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle 
bindel = ,XF86MonBrightnessUp, exec, swayosd-client --brightness +10 
bindel = ,XF86MonBrightnessDown, exec, swayosd-client --brightness -10 

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# -----------------------------------------------------
# RULES
# -----------------------------------------------------
windowrule = match:class ^(WhatsApp Desktop)$ , no_screen_share true 
windowrule = match:class .* , suppress_event maximize
windowrule = match:xwayland true , no_initial_focus true

windowrule = match:class ^(WhatsApp Desktop)$ , float true 
windowrule = match:class ^(fdm)$ , float true
windowrule = match:class ^(engrampa)$, float true
windowrule = match:class ^(eu.betterbird.Betterbird)$, float true
windowrule = match:class ^(kitty-dropterm)$ , float true
windowrule = match:class ^(blueman-manager)$ , float true
windowrule = match:class ^(steam_app_\d+)$ , immediate true
windowrule = match:class ^(steam_app_824270)$ , immediate false
windowrule = match:class ^(steam_app_\d+)$ , idle_inhibit focus
windowrule = match:title ^(.*- YouTube —.*)$ , idle_inhibit focus


xwayland {
  force_zero_scaling = true
}

debug {



}

# -----------------------------------------------------
# PLUGINS & SCRIPTS
# -----------------------------------------------------
exec-once = hyprpm reload -n

#bind = ALT, TAB, hyprexpo:expo, toggle

# Pyprland
exec-once = /usr/bin/pypr
bind = $mainMod,A,exec,pypr toggle term
bind = $mainMod,B,exec,pypr toggle email
bind = $mainMod,D,exec,pypr toggle fdm
bind = $mainMod,S,exec,pypr toggle whatsapp
